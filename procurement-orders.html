<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZPLM - 采购订单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #3d4647;
        }
        .top-bar {
            background: white;
            height: 80px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 28px; font-weight: 800; color: #00890b; cursor: pointer; }
        .top-nav-links { display: flex; align-items: center; gap: 24px; }
        .top-nav-links a { color: #3d4647; text-decoration: none; font-size: 14px; font-weight: 500; }
        .top-bar-right { display: flex; align-items: center; gap: 16px; }
        .main-content { padding: 32px; max-width: 1440px; margin: 0 auto; }
        .page-header {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .page-subtitle {
            font-size: 14px;
            color: #666;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #00890b;
            color: white;
        }
        .btn-primary:hover {
            background: #007309;
        }
        .content-section {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 12px;
            background: #f8f9fa;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            border-bottom: 2px solid #e0e0e0;
        }
        td {
            padding: 16px 12px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
        }
        tr:hover {
            background: #f8f9fa;
        }
    
        /* Responsive Typography */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px !important;
            }

            .section-header h2,
            .benefits-content h2,
            .cta h2 {
                font-size: 32px !important;
            }

            .hero p {
                font-size: 16px !important;
            }

            .section-header p,
            .cta p {
                font-size: 16px !important;
            }

            .nav-container {
                padding: 0 20px !important;
            }

            .hero,
            .features,
            .benefits,
            .pricing,
            .use-cases,
            .cta {
                padding: 60px 20px !important;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 28px !important;
            }

            .btn {
                padding: 10px 20px !important;
                font-size: 13px !important;
            }

            .hero-actions {
                flex-direction: column !important;
                width: 100%;
            }

            .hero-actions .btn {
                width: 100%;
            }
        }

    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo" onclick="location.href='index.html'">EZPLM</div>
        <div class="top-bar-right">
            <div class="top-nav-links">
                <a href="cloud-search.html">🌐 云端元器件库</a>
                <a href="reference-designs.html">📚 参考设计库</a>
            </div>
            <button style="background: none; border: none; cursor: pointer; font-size: 20px; position: relative;" onclick="location.href='notification-center.html'">
                🔔
                <span style="position: absolute; top: -4px; right: -4px; background: #ff6b6b; color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px;">15</span>
            </button>
            <button style="background: none; border: none; cursor: pointer; font-size: 20px; position: relative;" onclick="location.href='approval-center.html'">
                ✅
                <span style="position: absolute; top: -4px; right: -4px; background: #4dabf7; color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px;">8</span>
            </button>
            <div style="width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #00890b 0%, #00b30e 100%); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer;" onclick="location.href='profile.html'" title="个人中心">用</div>
        </div>
    </div>
    <div class="main-content">

        <div class="page-header">
            <div class="page-title">📋 采购订单管理</div>
            <div class="page-subtitle">跟踪所有采购订单的执行状态</div>
        </div>

        <div class="content-section">
            <div class="section-title">进行中的订单</div>
            <table>
                <thead>
                    <tr>
                        <th>订单编号</th>
                        <th>供应商</th>
                        <th>订单金额</th>
                        <th>下单时间</th>
                        <th>预计交付</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>PO-2025-001</td>
                        <td>深圳XX电子</td>
                        <td>¥65,000</td>
                        <td>2025-01-20</td>
                        <td>2025-02-05</td>
                        <td><span style="color: #f39c12;">🚚 待发货</span></td>
                        <td><button class="btn btn-primary" onclick="viewOrder(1)">查看详情</button></td>
                    </tr>
                    <tr>
                        <td>PO-2025-005</td>
                        <td>北京YY科技</td>
                        <td>¥12,500</td>
                        <td>2025-01-25</td>
                        <td>2025-02-10</td>
                        <td><span style="color: #00890b;">✓ 已发货</span></td>
                        <td><button class="btn" style="background: #f5f5f5;" onclick="trackShipping(5)">物流追踪</button></td>
                    </tr>
                    <tr>
                        <td>PO-2025-008</td>
                        <td>上海ZZ元器件</td>
                        <td>¥28,300</td>
                        <td>2025-01-27</td>
                        <td>2025-02-12</td>
                        <td><span style="color: #666;">📝 待审批</span></td>
                        <td><button class="btn" style="background: #f5f5f5;">等待审批</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <script>
            function viewOrder(id) {
                alert('订单详情页面开发中...');
            }
            function trackShipping(id) {
                alert('🚚 物流信息：\n\n快递公司：顺丰速运\n运单号：SF1234567890\n当前状态：运输中\n预计送达：2025-02-01');
            }
        </script>
        
    </div>
</body>
</html>
