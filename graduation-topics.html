<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目广场 - EZPLM毕业设计中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        /* 顶部导航 */
        .top-bar { background: white; height: 80px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 28px; font-weight: 800; color: #00890b; cursor: pointer; }
        .mode-switcher { display: flex; gap: 8px; padding: 6px; background: #f5f5f5; border-radius: 8px; }
        .mode-link { padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .mode-link.graduation { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .mode-link.outsourcing { color: #00d2ff; }
        .mode-link:hover { transform: translateY(-1px); }
        .top-bar-right { display: flex; align-items: center; gap: 24px; margin-left: auto; }
        .top-nav-links { display: flex; align-items: center; gap: 24px; }
        .top-nav-links a { color: #3d4647; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
        .top-nav-links a:hover { color: #00890b; }

        /* 返回按钮 */
        .back-btn { display: flex; align-items: center; gap: 8px; background: white; border: 2px solid #e0e0e0; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #3d4647; cursor: pointer; transition: all 0.3s; }
        .back-btn:hover { border-color: #667eea; background: #f8f9ff; color: #667eea; transform: translateX(-2px); }

        /* 主容器 */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* 页面头部 */
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 40px;
            color: white;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '🎓';
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 100px;
            opacity: 0.2;
        }

        .page-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .page-subtitle {
            font-size: 16px;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        /* 布局 */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
        }

        /* 筛选侧边栏 */
        .filter-sidebar {
            position: sticky;
            top: 94px;
            height: fit-content;
        }

        .filter-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }

        .filter-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #333;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .filter-option:hover {
            background: #f8f9ff;
        }

        .filter-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .filter-count {
            margin-left: auto;
            color: #999;
            font-size: 12px;
        }

        .clear-filters {
            margin-top: 16px;
            width: 100%;
            padding: 10px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .clear-filters:hover {
            background: #f8f9ff;
        }

        /* 主内容区 */
        .main-content {
            min-height: 600px;
        }

        /* 搜索和排序栏 */
        .toolbar {
            background: white;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #999;
        }

        .sort-select {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 150px;
        }

        /* 结果统计 */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .results-count {
            font-size: 14px;
            color: #666;
        }

        .results-count strong {
            color: #667eea;
            font-weight: 700;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        .view-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .view-btn:hover {
            border-color: #667eea;
        }

        .view-btn.active {
            border-color: #667eea;
            background: #f8f9ff;
            color: #667eea;
        }

        /* 项目网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        /* 项目卡片 */
        .project-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(102,126,234,0.15);
        }

        .project-header {
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .company-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .company-logo {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .company-name {
            font-size: 14px;
            font-weight: 600;
        }

        .project-status {
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            font-size: 12px;
            font-weight: 600;
        }

        .save-btn {
            position: absolute;
            top: 84px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
            transition: all 0.3s;
        }

        .save-btn:hover {
            transform: scale(1.1);
        }

        .save-btn.saved {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: white;
        }

        .project-body {
            padding: 20px;
        }

        .project-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #333;
            line-height: 1.4;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tag {
            padding: 4px 12px;
            background: #f0f0f0;
            border-radius: 16px;
            font-size: 12px;
            color: #666;
        }

        .tag.difficulty {
            background: #fff3e0;
            color: #ff9800;
        }

        .project-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #666;
        }

        .project-footer {
            padding: 0 20px 20px;
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #f8f9ff;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 40px;
        }

        .page-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .page-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .page-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 16px;
            color: #999;
            margin-bottom: 24px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
        }

        .modal-body {
            padding: 32px;
        }

        @media (max-width: 1024px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .filter-sidebar {
                position: static;
            }

            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }
    
        /* Responsive Grid Support */
        @media (max-width: 768px) {
            .features-grid,
            .pricing-grid,
            .use-cases-grid,
            .benefits-container,
            .footer-container {
                grid-template-columns: 1fr !important;
            }

            .hero-stats {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 1024px) and (min-width: 769px) {
            .features-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .pricing-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }

    
        /* Responsive Typography */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px !important;
            }

            .section-header h2,
            .benefits-content h2,
            .cta h2 {
                font-size: 32px !important;
            }

            .hero p {
                font-size: 16px !important;
            }

            .section-header p,
            .cta p {
                font-size: 16px !important;
            }

            .nav-container {
                padding: 0 20px !important;
            }

            .hero,
            .features,
            .benefits,
            .pricing,
            .use-cases,
            .cta {
                padding: 60px 20px !important;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 28px !important;
            }

            .btn {
                padding: 10px 20px !important;
                font-size: 13px !important;
            }

            .hero-actions {
                flex-direction: column !important;
                width: 100%;
            }

            .hero-actions .btn {
                width: 100%;
            }
        }

    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-bar">
        <div class="logo" onclick="location.href='index.html'">EZPLM</div>
        <div class="top-bar-right">
            <div class="top-nav-links">
                <a href="cloud-search.html">🌐 云端元器件库</a>
                <a href="reference-designs.html">📚 参考设计库</a>
                <a href="ai_coding_embedded.html">🤖 编程助手</a>
                <a href="pcb-editor-styled.html">📐 PCB预布局</a>
            </div>
            <button style="background: none; border: none; cursor: pointer; font-size: 20px; position: relative;" onclick="location.href='notification-center.html'" title="消息">
                🔔
                <span style="position: absolute; top: -4px; right: -4px; background: #ff6b6b; color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px;">15</span>
            </button>
            <div style="width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #00890b 0%, #00b30e 100%); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer;" onclick="location.href='profile.html'" title="账号">用</div>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 返回按钮 -->
        <div style="margin-bottom: 16px;">
            <button onclick="location.href='graduation-hub.html'" class="back-btn">
                <span>←</span>
                <span>返回毕业设计中心</span>
            </button>
        </div>

        <!-- 页面头部 -->
        <div class="page-header">
            <div class="page-title">🎓 题目广场</div>
            <div class="page-subtitle">156个企业真实项目等你来选 · 直通名企Offer</div>
        </div>

        <!-- 布局 -->
        <div class="layout">
            <!-- 筛选侧边栏 -->
            <div class="filter-sidebar">
                <!-- 技术方向 -->
                <div class="filter-card">
                    <div class="filter-title">技术方向</div>
                    <div class="filter-group">
                        <label class="filter-option">
                            <input type="checkbox" value="embedded" onchange="applyFilters()">
                            <span>嵌入式开发</span>
                            <span class="filter-count">42</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="hardware" onchange="applyFilters()">
                            <span>硬件设计</span>
                            <span class="filter-count">28</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="iot" onchange="applyFilters()">
                            <span>物联网</span>
                            <span class="filter-count">35</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="fpga" onchange="applyFilters()">
                            <span>FPGA</span>
                            <span class="filter-count">18</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="signal" onchange="applyFilters()">
                            <span>信号处理</span>
                            <span class="filter-count">15</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="power" onchange="applyFilters()">
                            <span>电源管理</span>
                            <span class="filter-count">12</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="cv" onchange="applyFilters()">
                            <span>计算机视觉</span>
                            <span class="filter-count">22</span>
                        </label>
                    </div>
                </div>

                <!-- 难度等级 -->
                <div class="filter-card">
                    <div class="filter-title">难度等级</div>
                    <div class="filter-group">
                        <label class="filter-option">
                            <input type="checkbox" value="easy" onchange="applyFilters()">
                            <span>⭐ 入门级</span>
                            <span class="filter-count">45</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="medium" onchange="applyFilters()">
                            <span>⭐⭐ 进阶级</span>
                            <span class="filter-count">68</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="hard" onchange="applyFilters()">
                            <span>⭐⭐⭐ 挑战级</span>
                            <span class="filter-count">43</span>
                        </label>
                    </div>
                </div>

                <!-- 地区 -->
                <div class="filter-card">
                    <div class="filter-title">项目地区</div>
                    <div class="filter-group">
                        <label class="filter-option">
                            <input type="checkbox" value="beijing" onchange="applyFilters()">
                            <span>北京</span>
                            <span class="filter-count">28</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="shanghai" onchange="applyFilters()">
                            <span>上海</span>
                            <span class="filter-count">24</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="shenzhen" onchange="applyFilters()">
                            <span>深圳</span>
                            <span class="filter-count">35</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="hangzhou" onchange="applyFilters()">
                            <span>杭州</span>
                            <span class="filter-count">18</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="remote" onchange="applyFilters()">
                            <span>远程</span>
                            <span class="filter-count">51</span>
                        </label>
                    </div>
                </div>

                <!-- 福利待遇 -->
                <div class="filter-card">
                    <div class="filter-title">福利待遇</div>
                    <div class="filter-group">
                        <label class="filter-option">
                            <input type="checkbox" value="salary" onchange="applyFilters()">
                            <span>💰 有补贴</span>
                            <span class="filter-count">89</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="offer" onchange="applyFilters()">
                            <span>✅ 直通Offer</span>
                            <span class="filter-count">76</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="internship" onchange="applyFilters()">
                            <span>🎓 实习机会</span>
                            <span class="filter-count">92</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="mentor" onchange="applyFilters()">
                            <span>👨‍🏫 专家指导</span>
                            <span class="filter-count">156</span>
                        </label>
                    </div>
                </div>

                <button class="clear-filters" onclick="clearAllFilters()">清除筛选</button>
            </div>

            <!-- 主内容区 -->
            <div class="main-content">
                <!-- 搜索和排序 -->
                <div class="toolbar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-input" placeholder="搜索企业、技术方向或关键词..." id="searchInput" oninput="applyFilters()">
                    </div>
                    <select class="sort-select" id="sortSelect" onchange="applySort()">
                        <option value="recommended">推荐排序</option>
                        <option value="latest">最新发布</option>
                        <option value="hot">最热门</option>
                        <option value="salary">薪资最高</option>
                        <option value="deadline">即将截止</option>
                    </select>
                </div>

                <!-- 结果信息 -->
                <div class="results-info">
                    <div class="results-count">
                        找到 <strong id="resultCount">156</strong> 个匹配的项目
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn active">📊</button>
                        <button class="view-btn">📋</button>
                    </div>
                </div>

                <!-- 项目网格 -->
                <div class="projects-grid" id="projectsGrid">
                    <!-- 项目卡片将通过JavaScript动态生成 -->
                </div>

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span style="padding: 8px;">...</span>`;
                }
            }

            html += `
                <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
            `;

            pagination.innerHTML = html;
        }

        // 切换页码
        function changePage(page) {
            const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;

            currentPage = page;
            renderProjects();
            renderPagination();

            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });

        // 应用筛选
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const checkedFilters = Array.from(document.querySelectorAll('.filter-option input:checked')).map(cb => cb.value);

            filteredProjects = projects.filter(project => {
                // 搜索过滤
                const matchesSearch = !searchTerm ||
                    project.title.toLowerCase().includes(searchTerm) ||
                    project.company.toLowerCase().includes(searchTerm) ||
                    project.tags.some(tag => tag.toLowerCase().includes(searchTerm));

                // 分类过滤
                const matchesCategory = checkedFilters.length === 0 ||
                    checkedFilters.some(filter => {
                        if (filter === project.difficulty) return true;
                        if (project.category.includes(filter)) return true;
                        if (filter === project.location.toLowerCase()) return true;
                        if (project.benefits && project.benefits.includes(filter)) return true;
                        return false;
                    });

                return matchesSearch && matchesCategory;
            });

            currentPage = 1;
            renderProjects();
            renderPagination();
        }

        // 排序
        function applySort() {
            const sortValue = document.getElementById('sortSelect').value;

            switch(sortValue) {
                case 'latest':
                    filteredProjects.sort((a, b) => b.id - a.id);
                    break;
                case 'hot':
                    filteredProjects.sort((a, b) => b.applicants - a.applicants);
                    break;
                case 'salary':
                    filteredProjects.sort((a, b) => {
                        const salaryA = parseInt(a.salary) || 0;
                        const salaryB = parseInt(b.salary) || 0;
                        return salaryB - salaryA;
                    });
                    break;
                default:
                    filteredProjects = [...projects];
            }

            currentPage = 1;
            renderProjects();
            renderPagination();
        }
