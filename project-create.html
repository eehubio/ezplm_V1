<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZPLM - 创建项目</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f4f4;
            color: #3d4647;
        }

        .top-bar {
            background: white;
            height: 80px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #00890b;
            cursor: pointer;
        }
        .btn-back {
            padding: 10px 20px;
            background: white;
            color: #3d4647;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover {
            border-color: #00890b;
            color: #00890b;
        }

        .main-content {
            max-width: 1440px;
            margin: 0 auto;
            padding: 40px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 800;
            color: #2d2d2d;
            margin-bottom: 32px;
        }

        .creation-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .option-card {
            padding: 32px 24px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-card.active {
            border-color: #00890b;
            background: rgba(0, 137, 11, 0.05);
        }
        .option-card:hover {
            border-color: #00890b;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 137, 11, 0.15);
        }
        .option-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        .option-title {
            font-size: 16px;
            font-weight: 700;
            color: #3d4647;
            margin-bottom: 8px;
        }
        .option-desc {
            font-size: 13px;
            color: #666;
        }

        .form-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .form-section {
            margin-bottom: 32px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #2d2d2d;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            color: #3d4647;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #00890b;
        }
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .image-upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            background: #f9f9f9;
            transition: all 0.3s;
        }
        .image-upload-area:hover {
            border-color: #00890b;
            background: rgba(0, 137, 11, 0.02);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .checkbox-label:hover {
            background: rgba(0, 137, 11, 0.05);
        }

        .ai-section {
            margin-top: 24px;
            padding: 28px;
            background: linear-gradient(135deg, rgba(0, 137, 11, 0.08) 0%, rgba(0, 137, 11, 0.02) 100%);
            border-radius: 16px;
            border: 2px solid #00890b;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 2px solid #f0f0f0;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            border: none;
        }
        .btn-cancel {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
        }
        .btn-submit {
            background: #00890b;
            color: white;
        }
        .btn-submit:hover {
            background: #007309;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 137, 11, 0.3);
        }
    
        /* Responsive Grid Support */
        @media (max-width: 768px) {
            .features-grid,
            .pricing-grid,
            .use-cases-grid,
            .benefits-container,
            .footer-container {
                grid-template-columns: 1fr !important;
            }

            .hero-stats {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 1024px) and (min-width: 769px) {
            .features-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .pricing-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }

    
        /* Responsive Typography */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px !important;
            }

            .section-header h2,
            .benefits-content h2,
            .cta h2 {
                font-size: 32px !important;
            }

            .hero p {
                font-size: 16px !important;
            }

            .section-header p,
            .cta p {
                font-size: 16px !important;
            }

            .nav-container {
                padding: 0 20px !important;
            }

            .hero,
            .features,
            .benefits,
            .pricing,
            .use-cases,
            .cta {
                padding: 60px 20px !important;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 28px !important;
            }

            .btn {
                padding: 10px 20px !important;
                font-size: 13px !important;
            }

            .hero-actions {
                flex-direction: column !important;
                width: 100%;
            }

            .hero-actions .btn {
                width: 100%;
            }
        }

    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo" onclick="location.href='workspace-dashboard.html'">EZPLM</div>
        <button class="btn-back" onclick="location.href='project-list.html'">
            <span>←</span>
            <span>返回项目列表</span>
        </button>
    </div>

    <div class="main-content">
        <h1 class="page-title">创建项目</h1>

        <div class="creation-options">
            <div class="option-card active" onclick="selectCreationMethod('scratch')">
                <div class="option-icon">🆕</div>
                <div class="option-title">从头创建</div>
                <div class="option-desc">创建全新的项目</div>
            </div>
            <div class="option-card" onclick="selectCreationMethod('template')">
                <div class="option-icon">📋</div>
                <div class="option-title">使用模版</div>
                <div class="option-desc">从模版快速创建</div>
            </div>
            <div class="option-card" onclick="selectCreationMethod('import')">
                <div class="option-icon">📂</div>
                <div class="option-title">从文件导入</div>
                <div class="option-desc">导入Excel/CSV</div>
            </div>
            <div class="option-card" onclick="selectCreationMethod('clone')">
                <div class="option-icon">📑</div>
                <div class="option-title">克隆项目</div>
                <div class="option-desc">复制现有项目</div>
            </div>
        </div>

        <div class="form-container">
            <form id="projectForm">
                <div class="form-section">
                    <div class="section-title">
                        <span>📋</span>
                        <span>基本信息</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">项目名称 *</label>
                        <input type="text" class="form-input" placeholder="请输入项目名称" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">项目描述</label>
                        <textarea class="form-textarea" placeholder="请简要描述项目的目标和内容"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <span>项目封面图片</span>
                            <span style="color: #999; font-size: 13px; margin-left: 8px;">(推荐尺寸: 400x300px)</span>
                        </label>
                        <div class="image-upload-area" onclick="document.getElementById('projectImage').click()">
                            <div id="uploadPlaceholder">
                                <div style="font-size: 64px; margin-bottom: 16px;">📷</div>
                                <div style="color: #3d4647; font-size: 16px; font-weight: 600; margin-bottom: 8px;">点击上传项目封面</div>
                                <div style="color: #999; font-size: 13px;">支持 JPG, PNG 格式</div>
                            </div>
                            <div id="imagePreview" style="display: none;">
                                <img id="previewImg" style="max-width: 100%; max-height: 250px; border-radius: 8px;">
                            </div>
                        </div>
                        <input type="file" id="projectImage" accept="image/*" style="display: none;" onchange="previewImage(event)">
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                        <div class="form-group">
                            <label class="form-label">开始日期</label>
                            <input type="date" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">截止日期</label>
                            <input type="date" class="form-input">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="aiAssist" style="width: 20px; height: 20px; cursor: pointer;" onchange="toggleAI()">
                        <span style="font-weight: 700; font-size: 16px;">🤖 启用AI辅助规划</span>
                    </label>
                    <div style="font-size: 13px; color: #666; margin-top: 8px; margin-left: 32px;">
                        AI将帮助您分析需求文档，自动生成任务列表和时间规划
                    </div>
                </div>

                <div id="aiSection" class="ai-section" style="display: none;">
                    <div style="font-size: 18px; font-weight: 700; color: #00890b; margin-bottom: 20px;">
                        🤖 AI辅助规划配置
                    </div>

                    <div class="form-group">
                        <label class="form-label">功能与技术指标</label>
                        <textarea class="form-textarea" rows="6" placeholder="请描述项目的功能需求和技术指标，AI将基于这些信息生成详细规划。

示例：
• 主要功能：心率监测、步数统计、睡眠分析
• 技术指标：电池续航≥7天，防水等级IP68
• 性能要求：响应时间<100ms"></textarea>
                    </div>

                    <button type="button" class="btn btn-submit" style="width: 100%;" onclick="generateAIPlan()">
                        ✨ 生成AI规划方案
                    </button>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="location.href='project-list.html'">取消</button>
                    <button type="submit" class="btn btn-submit">创建项目</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function selectCreationMethod(method) {
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('active');
            });
            event.target.closest('.option-card').classList.add('active');

            if (method === 'template') {
                alert('项目模版库功能开发中...');
            } else if (method === 'import') {
                alert('文件导入功能开发中...');
            } else if (method === 'clone') {
                alert('克隆项目功能开发中...');
            }
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                    document.getElementById('imagePreview').style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        function toggleAI() {
            const checkbox = document.getElementById('aiAssist');
            const section = document.getElementById('aiSection');
            section.style.display = checkbox.checked ? 'block' : 'none';
        }

        function generateAIPlan() {
            alert('🤖 AI正在生成项目规划...\n\n将包括:\n• 任务分解\n• 时间规划\n• 资源配置\n• 风险预警');
        }

        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ 项目创建成功！\n\n正在跳转到项目详情页...');
            setTimeout(() => {
                location.href = 'project-detail.html?id=1';
            }, 1000);
        });
    </script>
</body>
</html>
