            font-size: 14px;
            font-weight: 600;
            background: white;

            height: fit-content;

            font-weight: 700;
            margin-bottom: 16px;
            color: #333;
        }

        .filter-group {
            display: flex;

            gap: 8px;
        }

        .filter-option {

            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;

            height: 18px;
            cursor: pointer;
        }

        .filter-count {
            margin-left: auto;
            color: #999;
            font-size: 12px;

        .toolbar {

            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            display: flex;
            gap: 16px;

            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;

        .search-input:focus {
            outline: none;
            border-color: #00d2ff;
            box-shadow: 0 0 0 3px rgba(0,210,255,0.1);

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #999;
        }

        .projects-grid {

            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-bottom: 32px;

        .project-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);

            position: relative;

            display: flex;
            align-items: center;

            gap: 12px;

        .company-logo {

            height: 40px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;

        .project-body {

        .project-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #333;
            line-height: 1.4;

        .project-tags {

            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tag {
            padding: 4px 12px;
            background: #f0f0f0;
            border-radius: 16px;
            font-size: 12px;
            color: #666;
        }

        .project-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;

        .meta-item {

            gap: 6px;
            font-size: 13px;
            color: #666;
        }

        .meta-highlight {
            color: #00d2ff;
            font-weight: 700;
        }

        .project-footer {
            padding: 0 20px 20px;
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;

        .btn-primary {
            background: linear-gradient(135deg, #00d2ff 0%, #3a47d5 100%);

        @media (max-width: 1024px) {
            .layout {

        @media (max-width: 768px) {
            .features-grid,

        @media (max-width: 1024px) and (min-width: 769px) {

            }

            .pricing-grid {

        /* Responsive Typography */
        @media (max-width: 768px) {

                font-size: 36px !important;
            }

            .section-header h2,
            .benefits-content h2,

            .nav-container {

            }

            }

                flex-direction: column !important;
                width: 100%;
            }

            .hero-actions .btn {
                width: 100%;
            }
        }

    </style>
</head>

                            <span>${project.status}</span>
                        </div>
                    </div>
                    <div class="project-body" onclick="viewProjectDetail(${project.id})">
                        <div class="project-title">${project.title}</div>
                        <div class="project-tags">
                            ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div style="font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 12px;">
                            ${project.desc}
                        </div>
                        <div class="project-meta">
                            <div class="meta-item">
                                <span>💰</span>
                                <span class="meta-highlight">${project.budget}</span>
                            </div>
                            <div class="meta-item">
                                <span>⏱️</span>
                                <span>${project.duration}</span>
                            </div>
                            <div class="meta-item">
                                <span>👥</span>
                                <span>${project.applicants}人已投标</span>
                            </div>
                            <div class="meta-item">
                                <span>📅</span>
                                <span>${project.deadline}</span>
                            </div>
                        </div>
                    </div>
                    <div class="project-footer">
                        <button class="btn btn-primary" onclick="applyProject(event, ${project.id})">立即投标</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 查看项目详情
        function viewProjectDetail(projectId) {
            // 打开项目详情模态框或跳转到详情页
            const modal = document.createElement('div');
            modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; overflow-y: auto; padding: 40px 20px;';

            const project = projects.find(p => p.id === projectId);

            modal.innerHTML = `
                <div style="background: white; border-radius: 16px; padding: 40px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;">
                    <button onclick="this.closest('[style*=fixed]').remove()" style="position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 32px; color: #999; cursor: pointer; line-height: 1;">&times;</button>

                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 2px solid #f0f0f0;">
                        <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #00d2ff 0%, #3a47d5 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 48px;">${project.logo}</div>
                        <div style="flex: 1;">
                            <div style="font-size: 24px; font-weight: 700; margin-bottom: 8px;">${project.title}</div>
                            <div style="color: #666; font-size: 15px;">${project.company} · ${project.location}</div>
                        </div>
                        <div style="padding: 8px 16px; background: rgba(0,210,255,0.1); color: #00d2ff; border-radius: 6px; font-weight: 600;">${project.status}</div>
                    </div>

                    <div style="margin-bottom: 24px;">
                        <div style="font-weight: 600; margin-bottom: 12px;">📋 项目描述</div>
                        <div style="font-size: 14px; color: #666; line-height: 1.8; background: #f9f9f9; padding: 20px; border-radius: 8px;">
                            ${project.desc}
                            <br><br>
                            本项目需要承接方具备丰富的${project.tags[0]}经验，熟悉${project.tags.slice(1).join('、')}等相关技术。
                            我们会提供完整的需求文档和技术支持，期待您的专业方案。
                        </div>
                    </div>

                    <div style="margin-bottom: 24px;">
                        <div style="font-weight: 600; margin-bottom: 12px;">🏷️ 技术标签</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            ${project.tags.map(tag => `<span style="padding: 8px 16px; background: #f0f0f0; border-radius: 20px; font-size: 13px;">${tag}</span>`).join('')}
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px;">
                        <div style="padding: 16px; background: #f9f9f9; border-radius: 8px;">
                            <div style="font-size: 12px; color: #999; margin-bottom: 4px;">💰 项目预算</div>
                            <div style="font-size: 20px; font-weight: 700; color: #00d2ff;">${project.budget}</div>
                        </div>
                        <div style="padding: 16px; background: #f9f9f9; border-radius: 8px;">
                            <div style="font-size: 12px; color: #999; margin-bottom: 4px;">⏱️ 项目周期</div>
                            <div style="font-size: 20px; font-weight: 700; color: #3d4647;">${project.duration}</div>
                        </div>
                        <div style="padding: 16px; background: #f9f9f9; border-radius: 8px;">
                            <div style="font-size: 12px; color: #999; margin-bottom: 4px;">📍 工作地点</div>
                            <div style="font-size: 16px; font-weight: 600; color: #3d4647;">${project.location}</div>
                        </div>
                        <div style="padding: 16px; background: #f9f9f9; border-radius: 8px;">
                            <div style="font-size: 12px; color: #999; margin-bottom: 4px;">👥 已投标人数</div>
                            <div style="font-size: 20px; font-weight: 700; color: #3d4647;">${project.applicants}人</div>
                        </div>
                    </div>

                    <div style="background: #fff9e6; border-left: 4px solid #ffa726; padding: 16px; border-radius: 6px; margin-bottom: 24px;">
                        <div style="font-weight: 600; margin-bottom: 8px; color: #f57c00;">⏰ 投标截止时间</div>
                        <div style="font-size: 14px; color: #666;">${project.deadline}</div>
                    </div>

                    <div style="display: flex; gap: 12px;">
                        <button onclick="window.location.href='outsourcing-apply.html?id=${project.id}'" style="flex: 1; padding: 14px; background: linear-gradient(135deg, #00d2ff 0%, #3a47d5 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                            立即投标
                        </button>
                        <button onclick="this.closest('[style*=fixed]').remove()" style="padding: 14px 24px; background: white; color: #00d2ff; border: 2px solid #00d2ff; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                            关闭
                        </button>
                    </div>
                </div>
            `;

            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };

            document.body.appendChild(modal);
        }

        // 申请项目
        function applyProject(event, projectId) {
            event.stopPropagation();
            window.location.href = `outsourcing-apply.html?id=${projectId}`;
        }

        // 平台筛选
        function filterPlatform(platform) {
            document.querySelectorAll('.platform-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            if (platform === 'all') {
                renderProjects(projects);
            } else {
                const filtered = projects.filter(p => p.platform === platform);
                renderProjects(filtered);
            }
        }

        // 页面加载时渲染项目
        document.addEventListener('DOMContentLoaded', function() {
            renderProjects();
        });
    </script>
</body>
</html>
